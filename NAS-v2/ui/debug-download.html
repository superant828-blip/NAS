<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>下载诊断</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .log { background: #000; padding: 10px; margin: 10px 0; border: 1px solid #333; }
        .error { color: #f55; }
        .success { color: #5f5; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔧 下载诊断工具</h1>
    
    <div>
        <button onclick="runTests()">▶ 运行全部测试</button>
        <button onclick="clearLog()">🗑 清空日志</button>
    </div>
    
    <h3>测试日志:</h3>
    <div id="log" class="log"></div>
    
    <script>
        const API_BASE = 'http://' + location.host + '/api/v1';
        const logEl = document.getElementById('log');
        
        function log(msg, type = '') {
            const div = document.createElement('div');
            div.textContent = '> ' + msg;
            if (type) div.className = type;
            logEl.appendChild(div);
            console.log(msg);
        }
        
        function clearLog() { logEl.innerHTML = ''; }
        
        async function runTests() {
            clearLog();
            const token = localStorage.getItem('token');
            
            log('=== 诊断开始 ===');
            log('Token: ' + (token ? token.substring(0, 30) + '...' : '❌ 无Token'));
            log('API_BASE: ' + API_BASE);
            
            if (!token) {
                log('❌ 请先登录后再测试', 'error');
                return;
            }
            
            // 测试1: 获取文件列表
            log('\n[测试1] 获取文件列表...');
            try {
                const filesRes = await fetch(API_BASE + '/files', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const files = await filesRes.json();
                log('✓ 获取文件列表成功, 共 ' + files.length + ' 个文件');
                
                // 找一个可下载的文件
                const file = files.find(f => !f.is_folder);
                if (file) {
                    log('测试文件: ID=' + file.id + ', name=' + file.name);
                    
                    // 测试2: 下载该文件
                    log('\n[测试2] 尝试下载文件ID=' + file.id + '...');
                    const downloadRes = await fetch(API_BASE + '/files/' + file.id + '/download', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    
                    log('HTTP状态: ' + downloadRes.status);
                    
                    if (downloadRes.ok) {
                        const blob = await downloadRes.blob();
                        log('✓ 下载成功! 大小: ' + blob.size + ' bytes', 'success');
                        
                        // 尝试触发下载
                        log('\n[测试3] 触发浏览器下载...');
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = file.name;
                        a.click();
                        window.URL.revokeObjectURL(url);
                        log('✓ 下载已触发', 'success');
                    } else {
                        const err = await downloadRes.text();
                        log('❌ 下载失败: ' + err, 'error');
                    }
                } else {
                    log('❌ 没有找到可下载的文件', 'error');
                }
            } catch(e) {
                log('❌ 错误: ' + e.message, 'error');
                console.error(e);
            }
            
            log('\n=== 诊断完成 ===');
        }
        
        // 自动运行
        runTests();
    </script>
</body>
</html>
